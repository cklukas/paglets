[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "paglets"
version = "0.1.0"
description = "A small Python Aglets-inspired mobile object runtime."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]
docs = ["mkdocs>=1.6,<2", "mkdocs-material>=9.5,<10", "mkdocstrings[python]>=0.28,<1"]
tui = ["textual>=8.2,<9"]

[project.scripts]
paglets-host = "paglets.cli:main"
paglets-tui = "paglets.tui:main"

[tool.hatch.build.targets.wheel]
packages = ["src/paglets"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
