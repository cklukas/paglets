site_name: paglets
site_description: Python Aglets-inspired mobile object runtime.
site_url: https://cklukas.github.io/paglets/
repo_url: https://github.com/cklukas/paglets
repo_name: cklukas/paglets

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy

extra_css:
  - assets/stylesheets/navigation.css
  - assets/stylesheets/diagram-zoom.css
  - assets/stylesheets/code-source.css

extra_javascript:
  - assets/javascripts/section-nav.js
  - assets/javascripts/diagram-zoom.js

nav:
  - Getting Started:
      - Overview: index.md
      - Implementing Paglets: implementing-paglets.md
      - Usage Ideas: usage-ideas.md
  - Operations:
      - Overview: operations/index.md
      - CLI: operations/cli.md
      - Host CLI: operations/host-cli.md
      - Configuration: operations/configuration.md
      - Local Multi-Host Development: operations/local-multi-host.md
      - Deployment And Importability: operations/deployment-importability.md
      - Package Releases: operations/package-releases.md
      - Git Auto-Update: git-auto-update.md
  - System Services:
      - Overview: system/index.md
      - Server Info: system/server-info.md
      - Mesh Info: system/mesh-info.md
      - User Info: system/user-info.md
      - Compute Slots: system/compute-slots.md
      - Artifact Transport: system/artifacts.md
  - Examples:
      - Overview: examples/index.md
      - Pi Compute: examples/compute.md
      - File Grabber: examples/file-grabber.md
      - Search: examples/search.md
      - Detached Compute With A Collector: examples/detached-compute-collector.md
      - Analysis Jobs: examples/analysis-jobs.md
      - Performance Benchmark: examples/performance.md
      - Mesh Movement Benchmark: examples/mesh-benchmark.md
      - Source-Tree Demos: examples/source-tree-demos.md
  - Technical Reference:
      - Overview: technical/overview.md
      - Core: technical/core.md
      - Runtime: technical/runtime.md
      - Artifacts: technical/artifacts.md
      - Patterns: technical/patterns.md
      - Remote: technical/remote.md
      - Persistence: technical/persistence.md
      - Services: technical/services.md
      - Serialization: technical/serialization.md
      - Configuration: technical/configuration.md
      - Tooling: technical/tooling.md
  - Project:
      - Status And Limitations: project/status.md
      - Glossary: glossary.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
      check_paths: true
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: Copyright (c) 2026 by C. Klukas. Licensed under the MIT License.
