name: Paper

"on":
  push:
    branches:
      - overview-paper
  pull_request: {}
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build:
    name: Build application note
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gnuplot-nox \
            jq \
            latexmk \
            lmodern \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended

      - name: Build paper
        run: make -C papers/paglets-application-note

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: paglets-application-note
          path: papers/paglets-application-note/build/paglets-application-note.pdf
          if-no-files-found: error

      - name: Publish paper release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PDF_PATH: papers/paglets-application-note/build/paglets-application-note.pdf
        run: |
          set -euo pipefail

          release_date="$(date -u +%F)"
          release_tag="paper-${release_date}"
          release_title="Paglets application note ${release_date}"
          release_notes="Application note PDF built from overview-paper commit ${GITHUB_SHA}."

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" "${PDF_PATH}" --clobber
            gh release edit "${release_tag}" \
              --title "${release_title}" \
              --notes "${release_notes}"
          else
            gh release create "${release_tag}" "${PDF_PATH}" \
              --target "${GITHUB_SHA}" \
              --title "${release_title}" \
              --notes "${release_notes}"
          fi

          echo "Published ${PDF_PATH} to release ${release_tag}."

      - name: Refresh documentation site
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml --ref main
