name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'paper-')
    runs-on: ubuntu-latest
    env:
      PAPER_ASSET_NAME: paglets-application-note.pdf
      PAPER_TAG_PREFIX: paper-
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: docs

      - name: Install documentation dependencies
        run: uv sync --extra docs

      - name: Add application note PDF
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import time
          import urllib.request

          api_root = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          asset_name = os.environ["PAPER_ASSET_NAME"]
          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = pathlib.Path(os.environ["GITHUB_EVENT_PATH"])
          repo = os.environ["GITHUB_REPOSITORY"]
          tag_prefix = os.environ["PAPER_TAG_PREFIX"]
          token = os.environ["GH_TOKEN"]

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "paglets-docs-workflow",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def api_json(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  data = json.loads(response.read().decode("utf-8"))
                  links = response.headers.get("Link", "")
              return data, links

          def next_link(links):
              for part in links.split(","):
                  sections = [section.strip() for section in part.split(";")]
                  if len(sections) == 2 and sections[1] == 'rel="next"':
                      return sections[0].strip("<>")
              return None

          def paper_release_from_event():
              event = json.loads(event_path.read_text(encoding="utf-8"))
              release = event["release"]
              tag_name = release["tag_name"]
              if not tag_name.startswith(tag_prefix):
                  raise SystemExit(f"Release tag {tag_name!r} does not start with {tag_prefix!r}.")
              return release

          def latest_paper_release():
              releases = []
              url = f"{api_root}/repos/{repo}/releases?per_page=100"
              while url:
                  page, links = api_json(url)
                  releases.extend(page)
                  url = next_link(links)

              candidates = [
                  release
                  for release in releases
                  if release.get("tag_name", "").startswith(tag_prefix)
                  and not release.get("draft", False)
                  and release.get("published_at")
              ]
              if not candidates:
                  raise SystemExit(f"No published {tag_prefix}* release found.")
              return max(candidates, key=lambda release: release["published_at"])

          def find_asset(release):
              for asset in release.get("assets", []):
                  if asset.get("name") == asset_name:
                      return asset
              return None

          release = paper_release_from_event() if event_name == "release" else latest_paper_release()
          asset = None
          for attempt in range(1, 7):
              asset = find_asset(release)
              if asset:
                  break
              if event_name != "release":
                  break
              print(
                  f"{asset_name} is not visible on release {release['tag_name']} yet; "
                  f"retrying ({attempt}/6)."
              )
              time.sleep(10)
              release, _ = api_json(release["url"])

          if asset is None:
              raise SystemExit(f"Release {release['tag_name']} has no asset named {asset_name}.")

          target = pathlib.Path("docs") / asset_name
          download_request = urllib.request.Request(
              asset["browser_download_url"],
              headers={"User-Agent": "paglets-docs-workflow"},
          )
          with urllib.request.urlopen(download_request, timeout=60) as response:
              content = response.read()

          if not content.startswith(b"%PDF-"):
              raise SystemExit(
                  f"Downloaded {asset_name} from {release['tag_name']}, "
                  "but the content is not a PDF."
              )

          target.write_bytes(content)
          print(f"Wrote {target} from release {release['tag_name']} ({len(content)} bytes).")
          PY

      - name: Build documentation
        run: uv run --extra docs mkdocs build --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'paper-')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
